services:
  - type: web
    name: niconico-discord-embed-bot
    runtime: node
    plan: free
    buildCommand: npm install --no-audit --no-fund
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22.22.0"
      - key: DISCORD_TOKEN
        sync: false
